<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Perihelix icon</title>
  <desc id="desc">A glowing orbital arcade mark with a central core and twin orbit trails.</desc>
  <defs>
    <radialGradient id="bg" cx="36%" cy="24%" r="78%">
      <stop offset="0%" stop-color="#30366f"/>
      <stop offset="42%" stop-color="#121833"/>
      <stop offset="100%" stop-color="#050711"/>
    </radialGradient>
    <linearGradient id="orbitA" x1="105" y1="85" x2="407" y2="427">
      <stop offset="0%" stop-color="#77f7ff"/>
      <stop offset="48%" stop-color="#8d6cff"/>
      <stop offset="100%" stop-color="#ff4fd8"/>
    </linearGradient>
    <linearGradient id="orbitB" x1="105" y1="427" x2="407" y2="85">
      <stop offset="0%" stop-color="#f8d14a"/>
      <stop offset="48%" stop-color="#fb6b58"/>
      <stop offset="100%" stop-color="#9a6cff"/>
    </linearGradient>
    <filter id="glow" x="-45%" y="-45%" width="190%" height="190%">
      <feGaussianBlur stdDeviation="13" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.52 0 0 0 0 0.34 0 0 0 0 1 0 0 0 0.92 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="168" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>
  <ellipse cx="256" cy="256" rx="184" ry="72" fill="none" stroke="url(#orbitA)" stroke-width="24" stroke-linecap="round" transform="rotate(-34 256 256)" filter="url(#glow)"/>
  <ellipse cx="256" cy="256" rx="178" ry="68" fill="none" stroke="url(#orbitB)" stroke-width="18" stroke-linecap="round" transform="rotate(42 256 256)" opacity="0.9"/>
  <circle cx="256" cy="256" r="54" fill="#f8fbff" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="28" fill="#6ff7ff"/>
  <circle cx="390" cy="180" r="20" fill="#ffdb59"/>
  <circle cx="126" cy="320" r="16" fill="#ff4fd8"/>
</svg>
