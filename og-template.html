<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    background: #0a0e1a;
    background-image:
      radial-gradient(ellipse 50% 50% at 20% 20%, rgba(232,192,64,0.18) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 85% 85%, rgba(139,108,246,0.14) 0%, transparent 60%);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
    color: #f2f2f4;
    display: flex;
    align-items: center;
    padding: 90px;
    overflow: hidden;
    position: relative;
  }
  /* Subtle grid pattern */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
  }
  .content {
    display: flex;
    align-items: center;
    gap: 70px;
    position: relative;
    z-index: 1;
  }
  .logo-wrap {
    position: relative;
    width: 240px;
    height: 240px;
    flex-shrink: 0;
  }
  .logo-wrap::before {
    content: '';
    position: absolute;
    inset: -24px;
    border-radius: 50%;
    background: conic-gradient(from 180deg, rgba(232,192,64,0.55), rgba(139,108,246,0.5), rgba(232,192,64,0.55));
    filter: blur(32px);
    opacity: 0.7;
  }
  .logo {
    position: relative;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: #fff;
    border: 2px solid rgba(255,255,255,0.2);
    overflow: hidden;
  }
  .logo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .text {
    flex: 1;
  }
  .label {
    font-size: 22px;
    font-weight: 500;
    color: #8a8f9c;
    margin-bottom: 14px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    display: inline-flex;
    align-items: center;
    gap: 12px;
  }
  .label::before {
    content: '';
    width: 28px;
    height: 2px;
    background: #E8C040;
    border-radius: 2px;
  }
  .title {
    font-size: 92px;
    font-weight: 800;
    letter-spacing: -2.5px;
    line-height: 1;
    margin-bottom: 24px;
    background: linear-gradient(135deg, #ffffff 0%, #b8bcc8 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .tagline {
    font-size: 32px;
    color: #b0b4be;
    font-weight: 400;
    line-height: 1.3;
    letter-spacing: -0.5px;
  }
  .footer {
    position: absolute;
    bottom: 50px;
    left: 90px;
    right: 90px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 20px;
    color: #555a66;
    z-index: 1;
  }
  .footer .url {
    color: #E8C040;
    font-weight: 600;
  }
</style>
</head>
<body>
  <div class="content">
    <div class="logo-wrap">
      <div class="logo">
        <img src="logo.png" alt="">
      </div>
    </div>
    <div class="text">
      <div class="label">Indie iOS Developer</div>
      <div class="title">Tota Labs</div>
      <div class="tagline">Turning random ideas into apps.</div>
    </div>
  </div>
  <div class="footer">
    <span class="url">tota-labs.com</span>
    <span>Cicho · Ozaio · Neural Blitz</span>
  </div>
</body>
</html>
